# DEBUG: ansible-pull -U https://github.com/s3rj1k/libvirt-ipmi.git contrib/ansible-pull/playbook.yml

---
- name: Libvirt with IPMI
  hosts: localhost
  connection: local
  become: true
  vars:
    cirros_image_url: "https://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img"

  pre_tasks:
    - name: Check if distribution is Ubuntu
      fail:
        msg: "This playbook only supports Ubuntu distributions"
      when: ansible_distribution != "Ubuntu"

    - name: Get Ubuntu version
      debug:
        msg: "Running on Ubuntu {{ ansible_distribution_version }}"
      when: ansible_distribution == "Ubuntu"

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: restart libvirtd
      service:
        name: libvirtd
        state: restarted

  tasks:
    - name: Remove all snap packages
      shell: |
        snap list | awk '!/^Name|^core|^snapd|^lxd/ {print $1}' | xargs -r snap remove --purge
        snap list | awk '/^lxd/ {print $1}' | xargs -r snap remove --purge
        snap list | awk '/^core/ {print $1}' | xargs -r snap remove --purge
        snap list | awk '/^snapd/ {print $1}' | xargs -r snap remove --purge
        snap list | awk '!/^Name/ {print $1}' | xargs -r snap remove --purge
      ignore_errors: yes

    - name: Remove system packages
      apt:
        name:
          - apparmor
          - byobu
          - lxd
          - lxd-agent-loader
          - snapd
          - ufw
        state: absent
        purge: yes
        autoremove: yes

    - name: Remove snap directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /root/snap
        - /run/snapd
        - /snap
        - /var/cache/snapd
        - /var/snap

    - name: Remove system users and groups
      block:
        - name: Remove users
          user:
            name: "{{ item }}"
            state: absent
            remove: yes
          loop:
            - ubuntu
            - lxd
          ignore_errors: yes

        - name: Remove groups
          group:
            name: "{{ item }}"
            state: absent
          loop:
            - ubuntu
            - lxd
          ignore_errors: yes

    - name: Configure and generate locale
      block:
        - name: Set locale in configuration
          copy:
            dest: /etc/default/locale
            content: |
              LANG=en_US.UTF-8
              LANGUAGE=en_US:en
              LC_ALL=en_US.UTF-8

        - name: Generate locale
          command: locale-gen en_US.UTF-8
          changed_when: false

    - name: Update and upgrade system packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Install required packages
      apt:
        name:
          - bridge-utils
          - git
          - ipmitool
          - libvirt-clients
          - libvirt-daemon-system
          - locales
          - mc
          - nano
          - python3-libvirt
          - python3-pyghmi
          - qemu-kvm
          - virtinst
          - wget
        state: present

    - name: Configure SSH client
      copy:
        dest: /etc/ssh/ssh_config
        content: |
          Host *
            AddressFamily inet
            ForwardAgent yes
            PasswordAuthentication no
            # CheckHostIP no
            # HashKnownHosts no
            # StrictHostKeyChecking no

    - name: Configure SSH server
      block:
        - lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^#?PermitRootLogin'
            line: 'PermitRootLogin prohibit-password'
        - file:
            path: /etc/ssh/sshd_config.d/60-cloudimg-settings.conf
            state: absent
      notify: restart sshd

    - name: Configure libvirt QEMU
      copy:
        dest: /etc/libvirt/qemu.conf
        content: |
          security_driver = "none"
          user = "root"
          group = "root"
          dynamic_ownership = 0
      notify: restart libvirtd

    - name: Enable libvirtd service
      service:
        name: libvirtd
        enabled: yes
        state: started

    - name: Create libvirt images directory
      file:
        path: /var/lib/libvirt/images
        state: directory
        mode: '0755'

    - name: Download CirrOS image
      get_url:
        url: "{{ cirros_image_url }}"
        dest: /var/lib/libvirt/images/cirros.qcow2
        mode: '0644'

    - name: Set CirrOS image ownership
      file:
        path: /var/lib/libvirt/images/cirros.qcow2
        owner: libvirt-qemu
        group: libvirt-qemu

    - name: Configure CirrOS domain
      copy:
        dest: /root/cirros-domain.xml
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <domain type="kvm">
            <name>cirros</name>
            <memory unit="MiB">512</memory>
            <vcpu>1</vcpu>
            <os>
              <type arch="x86_64" machine="q35">hvm</type>
              <boot dev="hd"/>
            </os>
            <features>
              <acpi/>
              <apic/>
            </features>
            <cpu mode="host-passthrough"/>
            <clock offset="utc">
              <timer name="rtc" tickpolicy="catchup"/>
              <timer name="pit" tickpolicy="delay"/>
              <timer name="hpet" present="no"/>
            </clock>
            <devices>
              <emulator>/usr/bin/qemu-system-x86_64</emulator>
              <disk type="file" device="disk">
                <driver name="qemu" type="qcow2"/>
                <source file="/var/lib/libvirt/images/cirros.qcow2"/>
                <target dev="vda" bus="virtio"/>
              </disk>
              <interface type="network">
                <source network="default"/>
                <model type="virtio"/>
              </interface>
              <console type="pty">
                <target type="serial" port="0"/>
              </console>
              <channel type="unix">
                <target type="virtio" name="org.qemu.guest_agent.0"/>
              </channel>
              <video>
                <model type="virtio"/>
              </video>
              <graphics type="vnc" port="-1" autoport="yes" listen="0.0.0.0">
                <listen type="address" address="0.0.0.0"/>
              </graphics>
              <rng model="virtio">
                <backend model="random">/dev/urandom</backend>
              </rng>
            </devices>
          </domain>

    - name: Handle CirrOS domain definition
      block:
        - name: Check if domain exists
          command: virsh dominfo cirros
          register: domain_check
          ignore_errors: true

        - name: Undefine existing domain if it exists
          command: virsh undefine cirros
          when: domain_check.rc == 0

        - name: Define CirrOS domain in libvirt
          command: virsh define /root/cirros-domain.xml

    - name: Install libvirt-ipmi
      block:
        - name: Generate random password for IPMI
          ansible.builtin.set_fact:
            ipmi_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=32) }}"

        - name: Clone libvirt-ipmi repository
          git:
            repo: 'https://github.com/s3rj1k/libvirt-ipmi.git'
            dest: /opt/libvirt-ipmi
            version: main

        - name: Save IPMI password to file
          copy:
            content: "{{ ipmi_password }}"
            dest: /root/.ipmi_password
            mode: '0600'
            owner: root
            group: root

        - name: Create bash helper for IPMI commands
          copy:
            dest: /etc/profile.d/ipmi-helpers.sh
            mode: '0644'
            content: |
              alias ipmi='ipmitool -I lanplus -H localhost -P $(cat /root/.ipmi_password)'

        - name: Create IPMI commands helper file
          copy:
            dest: /root/ipmi_commands.txt
            mode: '0644'
            content: |
              # Boot commands
              ipmi -U cirros chassis bootparam get 5                # Get boot parameter
              ipmi -U cirros chassis bootdev pxe|disk|cdrom|floppy  # Set boot device

              # Power control commands
              ipmi -U cirros chassis power off      # Power off system
              ipmi -U cirros chassis power on       # Power on system
              ipmi -U cirros chassis power diag     # Power diagnostic interrupt
              ipmi -U cirros chassis power reset    # Hard reset
              ipmi -U cirros chassis power soft     # Soft shutdown
              ipmi -U cirros chassis power status   # Get power status

              # Management Controller commands
              ipmi -U cirros mc guid               # Get system GUID
              ipmi -U cirros mc info               # Get MC info

        - name: Create systemd service file
          copy:
            dest: /etc/systemd/system/libvirt-ipmi.service
            content: |
              [Unit]
              Description=Libvirt IPMI Bridge Service
              After=network.target libvirtd.service
              Wants=libvirtd.service

              [Service]
              Type=simple
              User=root
              Group=root
              WorkingDirectory=/opt/libvirt-ipmi
              Environment="LIBVIRT_IPMI_ADDRESS=0.0.0.0"
              Environment="LIBVIRT_IPMI_PORT=623"
              Environment="LIBVIRT_IPMI_CONNECT=qemu:///system"
              Environment="LIBVIRT_IPMI_PASSWORD={{ ipmi_password }}"
              Environment="LIBVIRT_IPMI_TIMEOUT=30"
              Environment="LIBVIRT_IPMI_LOG_LEVEL=INFO"
              ExecStart=/usr/bin/python3 /opt/libvirt-ipmi/libvirtipmi.py
              Restart=always
              RestartSec=3

              # Security settings
              CapabilityBoundingSet=CAP_NET_BIND_SERVICE
              AmbientCapabilities=CAP_NET_BIND_SERVICE
              ProtectSystem=strict
              ProtectHome=yes
              PrivateTmp=yes
              PrivateDevices=yes
              ProtectKernelTunables=yes
              ProtectControlGroups=yes
              NoNewPrivileges=yes
              RestrictNamespaces=yes
              ReadWritePaths=/var/run/libvirt
              LockPersonality=yes

              [Install]
              WantedBy=multi-user.target

        - name: Reload systemd daemon
          systemd:
            daemon_reload: yes

        - name: Enable and start libvirt-ipmi service
          systemd:
            name: libvirt-ipmi
            enabled: yes
            state: started

    - name: Mask unnecessary systemd units
      systemd:
        name: "{{ item }}"
        masked: yes
      loop:
        - apparmor.service
        - auditd.service
        - connman.service
        - display-manager.service
        - firewalld.service
        - NetworkManager.service
        - openipmi.service
        - plymouth-quit-wait.service
        - plymouth-quit.service
        - plymouth-read-write.service
        - plymouth-start.service
        - rc-local.service
        - snapd.seeded.service
        - ua-auto-attach.service
        - ua-reboot-cmds.service
        - ua-timer.service
        - ubuntu-advantage-cloud-id-shim.service
        - ubuntu-advantage.service

    - name: Handle system reboot
      block:
        - name: Check if reboot is required
          stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Reboot system if required
          shell: "/usr/sbin/reboot"
          async: 1
          poll: 0
          when: reboot_required_file.stat.exists
          ignore_errors: true
